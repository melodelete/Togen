name: Build and Release Togen

on:
  push:
    tags:
      - 'v*' # Triggers the workflow only when you push a version tag (e.g., v1.0.0)

permissions:
  contents: write
  actions: read

jobs:
  release:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      # electron-builder automatically detects the OS it is running on 
      # and builds the correct target based on your package.json config.
      - name: Build and Publish Electron App
        run: npm run package -- --publish always
        env:
          # This token allows electron-builder to automatically draft a GitHub Release
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: false
        timeout-minutes: 60
        retry: 3
